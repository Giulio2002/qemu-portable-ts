name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  # Required for npm provenance (trusted publishing).
  id-token: write

jobs:
  build-binaries:
    uses: ./.github/workflows/build-binaries.yml

  publish:
    needs: build-binaries
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download built platform packages
        uses: actions/download-artifact@v4
        with:
          path: packages
      # download-artifact restores each artifact into packages/<name>/,
      # matching the workspace layout exactly.

      # Artifact transport (zip) strips POSIX file modes; npm pack records
      # on-disk modes, so without this the published binaries would not be
      # executable. verify-binary-package.ts gates on exactly this.
      - name: Restore executable permissions lost by artifact transport
        run: |
          for dir in packages/qemu-*/bin packages/qemu-*/lib; do
            [ -d "$dir" ] && chmod 755 "$dir"/* 2>/dev/null || true
          done

      - name: Build core package
        run: |
          npm ci
          npm run build
          npm test

      - name: Compliance gate (blocking)
        run: |
          set -e
          node --experimental-strip-types scripts/verify-license-files.ts
          for pkg in packages/qemu-*/; do
            # Skeleton dirs whose build did not run become placeholders later;
            # only populated packages must pass the full binary verification.
            if ls "$pkg"/bin/qemu-* > /dev/null 2>&1; then
              node --experimental-strip-types scripts/verify-binary-package.ts "$pkg"
            else
              echo "skipping unpopulated $pkg (will publish a placeholder)"
            fi
          done

      - name: npm pack test (fresh consumer install)
        run: |
          set -e
          mkdir -p /tmp/pack && cd /tmp/pack
          npm pack "$GITHUB_WORKSPACE/packages/qemu"
          npm pack "$GITHUB_WORKSPACE/packages/qemu-linux-x64"
          mkdir consumer && cd consumer
          npm init -y > /dev/null
          npm install ../qemu-portable-[0-9]*.tgz ../qemu-portable-linux-x64-*.tgz
          node -e "const q = require('qemu-portable'); console.log(q.getHostPlatform()); console.log(q.resolveQemuBinary('qemu-img').path);"
          npx qemu-portable run qemu-img -- --version
          npx qemu-portable run qemu-system-x86_64 -- -machine help

      # Every package named in the core package's optionalDependencies must
      # exist in the registry, or consumer installs 404-fail. Platforms whose
      # build artifact is missing get an installable placeholder (no binaries,
      # postinstall-free) so the dependency graph always resolves.
      - name: Generate placeholders for unbuilt platforms
        run: node --experimental-strip-types scripts/make-placeholder-package.ts --all

      # Binary packages publish first so the core package's
      # optionalDependencies already exist in the registry (project.md §14.3).
      # The publish list is derived from optionalDependencies so the two can
      # never drift.
      - name: Publish platform packages
        run: |
          set -e
          for dir in $(node -e "
            const deps = require('$GITHUB_WORKSPACE/packages/qemu/package.json').optionalDependencies;
            // npm name qemu-portable-<platform> -> workspace dir qemu-<platform>
            for (const name of Object.keys(deps)) console.log(name.replace('qemu-portable-', 'qemu-'));
          "); do
            name=$(node -p "require('./packages/$dir/package.json').name")
            version=$(node -p "require('./packages/$dir/package.json').version")
            # Idempotent: a retried release must skip what already made it to
            # the registry (a partial publish otherwise wedges every retry).
            if npm view "$name@$version" version > /dev/null 2>&1; then
              echo "$name@$version already published — skipping"
              continue
            fi
            # Leading ./ is required: a bare "packages/<dir>" is parsed by
            # npm as a GitHub owner/repo spec, not a local path.
            npm publish "./packages/$dir" --provenance --access public
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish core package
        run: |
          set -e
          version=$(node -p "require('./packages/qemu/package.json').version")
          if npm view "qemu-portable@$version" version > /dev/null 2>&1; then
            echo "qemu-portable@$version already published — skipping"
          else
            npm publish ./packages/qemu --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Assemble source-compliance archive
        run: |
          set -e
          QEMU_VERSION="$(cat third_party/qemu/QEMU_VERSION)"
          mkdir -p /tmp/source-release
          curl -fL --retry 3 -o "/tmp/source-release/qemu-${QEMU_VERSION}.tar.xz" \
            "https://download.qemu.org/qemu-${QEMU_VERSION}.tar.xz"
          (cd /tmp/source-release && sha256sum -c "$GITHUB_WORKSPACE/third_party/qemu/checksums/qemu-${QEMU_VERSION}.tar.xz.sha256")
          # patches/ is empty until we carry local patches, and git does not
          # track empty directories, so it may be absent on checkout.
          if [ -d third_party/qemu/patches ] && [ -n "$(ls -A third_party/qemu/patches)" ]; then
            cp -R third_party/qemu/patches /tmp/source-release/patches
          fi
          mkdir -p /tmp/source-release/build-scripts
          cp scripts/build-qemu-*.sh scripts/build-qemu-*.ps1 \
             scripts/collect-runtime-deps.ts scripts/generate-build-info.ts \
             /tmp/source-release/build-scripts/
          (cd /tmp/source-release && find . -type f -exec sha256sum {} \; > checksums.txt)

      - name: Create GitHub Release with source archive
        uses: softprops/action-gh-release@v2
        with:
          body: |
            QEMU upstream version: $(cat third_party/qemu/QEMU_VERSION)
            Platforms: linux-x64, linux-arm64, linux-x64-musl, linux-arm64-musl, darwin-arm64, darwin-x64, win32-x64, win32-arm64

            The attached source archive, patches, and build scripts are the
            complete corresponding source for the GPL-licensed binaries in the
            qemu-portable-* packages of this release.
          files: |
            /tmp/source-release/*
